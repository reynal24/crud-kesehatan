name: CI/CD CRUD Kesehatan

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy ke EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@3.26.179.153 << 'EOF'
          cd /var/www/crud-kesehatan
          git pull origin main
          sudo cp -r /var/www/crud-kesehatan/crud-kesehatan/* /var/www/crud-kesehatan/
          sudo systemctl restart nginx
          EOF